server.port=8080
spring.application.name=nuxt-project-backend

# ===== MySQL =====
spring.datasource.url=jdbc:mysql://localhost:13306/nuxt_test_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Still0.0Memory}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
jwt.secret=${JWT_SECRET:uZ1MNz+RPmOvQ76rSeOCbZEzwp2fBe1AaY417odVD8LNXb+dhw0dPEMxa3/R4u4/aOzfnFSQ/u72VagHr/k1og==}
jwt.expiration=86400000

# ===== Swagger / SpringDoc =====
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.example.nuxtproject.controller
springdoc.show-actuator=false

# ===== File Upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ===== Jackson =====
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.time-zone=Asia/Shanghai
