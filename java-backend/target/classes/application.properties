server.port=8080
spring.application.name=nuxt-project-backend

# ===== MySQL =====
spring.datasource.url=jdbc:mysql://localhost:13306/nuxt_test_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
# 生产环境请通过环境变量 JWT_SECRET 设置密钥，确保长度 >= 32 字节
jwt.secret=${JWT_SECRET:nuxt-project-backend-jwt-secret-key-2024-this-is-a-very-long-string-for-hs256}
jwt.expiration=86400000

# ===== Swagger / SpringDoc =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.example.nuxtproject.controller
springdoc.show-actuator=false

# ===== File Upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ===== Jackson =====
spring.jackson.serialization.fail-on-empty-beans=false
