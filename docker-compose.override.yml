services:
  mysql:
    ports:
      - "13306:3306"

  backend:
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev

  frontend:
    ports:
      - "3000:3000"
    environment:
      NUXT_API_PROXY_TARGET: http://backend:8080

  nginx:
    ports:
      - "80:80"
    profiles:
      - dev-nginx