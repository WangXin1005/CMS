name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Java 后端 SonarQube 审计
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONARQUBE_URL }} \
            -Dsonar.token=${{ secrets.SONARQUBE_TOKEN }} \
            -Dsonar.projectKey=CMS-backend \
            -Dsonar.projectName="CMS Backend (Spring Boot)" \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.qualitygate.wait=true \
            -DskipTests
        working-directory: ./java-backend

      - name: 前端 Nuxt SonarQube 审计
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_URL }}
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
        with:
          projectBaseDir: ./nuxt-test
          args: >
            -Dsonar.qualitygate.wait=true

      - name: 远程部署到服务器
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          timeout: 1800s
          command_timeout: 1800s
          script: |
            echo "===== 进入项目目录 ====="
            cd /opt/CMS

            echo "===== 拉取最新代码 ====="
            git pull origin main

            echo "===== 构建并启动容器 ====="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

            echo "===== 清理旧镜像 ====="
            docker image prune -f

            echo "===== 部署完成 ====="
            docker compose ps
