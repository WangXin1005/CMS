name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 代码审计 + 部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          timeout: 1800s
          command_timeout: 600s
          envs: SONARQUBE_TOKEN
          script: |
            set -e

            echo "===== 拉取代码 ====="
            cd /opt/CMS
            git pull origin main

            SONAR_URL=http://sonarqube:9000

            echo "===== SonarQube 后端审计 ====="
            docker run --rm --network cms_default \
              --memory=1500m --cpus=1.5 \
              -v ./java-backend:/app -w /app \
              -e SONAR_TOKEN=$SONARQUBE_TOKEN \
              maven:3.9-eclipse-temurin-21-alpine \
              mvn sonar:sonar \
                -Dsonar.host.url=$SONAR_URL \
                -Dsonar.projectKey=CMS-backend \
                -Dsonar.projectName="CMS Backend (Spring Boot)" \
                -Dsonar.qualitygate.wait=true \
                -DskipTests

            echo "===== SonarQube 前端审计 ====="
            docker run --rm --network cms_default \
              --memory=1000m --cpus=1 \
              -v ./nuxt-test:/app -w /app \
              -e SONAR_HOST_URL=$SONAR_URL \
              -e SONAR_TOKEN=$SONARQUBE_TOKEN \
              sonarsource/sonar-scanner-cli \
              sonar-scanner \
                -Dsonar.projectKey=CMS-frontend \
                -Dsonar.projectName="CMS Frontend (Nuxt)" \
                -Dsonar.exclusions="node_modules/**,dist/**,.output/**,.nuxt/**" \
                -Dsonar.qualitygate.wait=true

            echo "===== 审计通过，串行构建容器 ====="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build backend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f

            echo "===== 部署完成 ====="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps